<!DOCTYPE html>

<html>

<head>

<title>Result</title>


<style>

body{

background:#050505;

color:white;

font-family:Segoe UI;

display:flex;

justify-content:center;

padding:40px;

}



.card{

width:650px;

background:#111827;

padding:40px;

border-radius:20px;

box-shadow:0 0 30px #00ffc855;

}



.answer{

padding:15px;

margin:10px;

border-radius:12px;

}



.correct{

background:#16a34a;

}



.wrong{

background:#dc2626;

}



.normal{

background:#374151;

}



a{

display:block;

background:#00ffc8;

color:black;

padding:15px;

text-align:center;

border-radius:12px;

text-decoration:none;

margin-top:20px;

}



</style>

</head>


<body>


<div class="card">


<h1>

{% if is_correct %}

🎉 Correct!

{% else %}

❌ Wrong

{% endif %}


</h1>



<h2>

{{question | safe}}

</h2>




<div class="answer correct">

Correct answer:

{{correct | safe}}

</div>




{% if chosen != correct %}


<div class="answer wrong">


Your answer:

{{chosen | safe}}


</div>


{% endif %}




<a href="/quiz">

Next Question

</a>



<a href="/history">

View Previous Results

</a>


</div>


</body>

</html>

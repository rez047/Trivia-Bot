<!DOCTYPE html>

<html>

<head>

<title>Trivia Bot</title>


<style>

*{
    box-sizing:border-box;
    font-family:Segoe UI, Arial;
}


body{

    min-height:100vh;
    margin:0;

    background:
    radial-gradient(circle at top,#263238,#050505);

    color:white;

    display:flex;
    justify-content:center;
    align-items:center;

}



.quiz-box{

    width:700px;

    background:#111827;

    padding:40px;

    border-radius:20px;

    box-shadow:
    0 0 30px #00ffcc55;

}



h1{

    text-align:center;

    color:#00ffc8;

}



.score{

    text-align:center;

    font-size:22px;

    margin-bottom:25px;

}



.question{

    background:#1f2937;

    padding:25px;

    border-radius:15px;

    font-size:22px;

    margin-bottom:25px;

}



.answer-btn{


    width:100%;

    padding:15px;

    margin:10px 0;

    border:none;

    border-radius:12px;

    background:#374151;

    color:white;

    font-size:18px;

    cursor:pointer;

    transition:0.3s;

}



.answer-btn:hover{

    background:#00ffc8;

    color:black;

    transform:scale(1.03);

}



.correct{

    background:#16a34a !important;

}



.wrong{

    background:#dc2626 !important;

}



.next{


margin-top:20px;

display:block;

text-align:center;

background:#00ffc8;

color:black;

padding:14px;

border-radius:10px;

text-decoration:none;


}



</style>


</head>



<body>


<div class="quiz-box">



<h1>
🤖 Trivia Bot
</h1>



<div class="score">

Score:
{{current_user.score}}

</div>



<div class="question">

{{question.question | safe}}

</div>




<form method="POST" action="/answer">



<input type="hidden"
name="question"
value="{{question.question}}">



<input type="hidden"
name="correct"
value="{{question.correct_answer}}">





{% for a in question.incorrect_answers %}


<button

class="answer-btn"

name="answer"

value="{{a}}">


{{a | safe}}


</button>


{% endfor %}






<button

class="answer-btn"

name="answer"

value="{{question.correct_answer}}">


{{question.correct_answer | safe}}


</button>





</form>


</div>


</body>


</html>
